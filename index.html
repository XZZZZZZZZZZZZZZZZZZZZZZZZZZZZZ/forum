    <div id="adminPanel" class="hidden fixed inset-y-0 left-0 w-85 bg-gray-950 text-white z-50 p-6 shadow-2xl flex flex-col border-r border-gray-800 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">

            <button onclick="window.toggleAdminPanel()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>

        <div class="space-y-6 flex-grow pb-12">
            
            <div class="space-y-3 bg-gray-900 p-4 rounded-xl border border-gray-800">

                <div class="grid grid-cols-2 gap-2 text-center text-xs">
                    <div class="bg-gray-950 p-2.5 rounded border border-gray-800"><span class="block text-gray-400 text-[10px]">רשומים בפורום</span><span id="forumStatUsers" class="text-lg font-bold">0</span></div>
                    <div class="bg-gray-950 p-2.5 rounded border border-gray-800"><span class="block text-gray-400 text-[10px]">כניסות היום</span><span id="forumStatVisits" class="text-lg font-bold">0</span></div>
                </div>
            </div>

            <div class="space-y-3 bg-gray-900 p-4 rounded-xl border border-gray-800">
                <h4 class="text-sm font-bold text-blue-400 border-b border-gray-800 pb-1.5"><i class="fa-solid fa-user-shield ml-1"></i> הוספת מנהלי פורום</h4>
                <div id="forumAdminsList" class="space-y-1.5 max-h-32 overflow-y-auto"></div>
                <div class="flex gap-2 pt-1">
                    <input type="email" id="newForumAdminEmail" class="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-xs text-white outline-none" placeholder="כתובת מייל להוספה...">
                    <button onclick="window.addForumAdmin()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap">הוסף</button>

            </div>

            <div class="space-y-3 bg-gray-900 p-4 rounded-xl border border-gray-800">
                <h4 class="text-sm font-bold text-red-400 border-b border-gray-800 pb-1.5"><i class="fa-solid fa-folder-open ml-1"></i> ניהול ובקרת נושאים</h4>
                <p class="text-[11px] text-gray-400">בחר נושא מהרשימה באתר על מנת למחוק או לנעול אותו ישירות מתוך הפורום.</p>
                <div id="adminThreadsControlList" class="space-y-2 max-h-48 overflow-y-auto">
                    </div>
            </div>

            <div class="space-y-3 bg-gray-900 p-4 rounded-xl border border-gray-800">
                <h4 class="text-sm font-bold text-green-400 border-b border-gray-800 pb-1.5"><i class="fa-solid fa-advertisement ml-1"></i> הוספת באנר הודעות עליון</h4>
                <div class="flex items-center gap-2"><input type="checkbox" id="forumBannerActive" class="w-4 h-4"><label for="forumBannerActive" class="text-xs text-gray-300">הצג באנר בפורום</label></div>
                <input type="text" id="forumBannerTitleInput" class="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-xs text-white" placeholder="כותרת הבאנר...">
                <textarea id="forumBannerTextInput" rows="2" class="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-xs text-white resize-none" placeholder="תוכן הבאנר..."></textarea>
                <button onclick="window.saveForumBanner()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-xs font-bold transition">עדכן באנר</button>
            </div>

            <div class="space-y-3 bg-gray-800/50 p-4 rounded-xl border border-gray-800">
                <h4 class="text-sm font-bold text-orange-400 border-b border-gray-800 pb-1.5"><i class="fa-solid fa-bullhorn ml-1"></i> הוספת פופאפ קמפיין</h4>
                <div class="flex items-center gap-2"><input type="checkbox" id="forumPopupActive" class="w-4 h-4"><label for="forumPopupActive" class="text-xs text-gray-300">הפעל פופאפ הודעה</label></div>
                <input type="text" id="forumPopupTitleInput" class="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-xs text-white" placeholder="כותרת הפופאפ...">
                <textarea id="forumPopupTextInput" rows="2" class="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-xs text-white resize-none" placeholder="תוכן הודעת הפופאפ..."></textarea>
                <button onclick="window.saveForumPopup()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-2 rounded-lg text-xs font-bold transition">עדכן פופאפ בענן</button>

    <div id="forumPopupModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl text-center relative border border-gray-100">
            <button onclick="document.getElementById('forumPopupModal').classList.add('hidden')" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center mx-auto mb-4 border border-orange-100 text-xl"><i class="fa-solid fa-bullhorn"></i></div>
            <h3 id="popupTitleDisplay" class="text-lg font-black text-gray-900 mb-2"></h3>
            <p id="popupTextDisplay" class="text-gray-600 text-xs leading-relaxed mb-5"></p>
            <button onclick="document.getElementById('forumPopupModal').classList.add('hidden')" class="w-full bg-gray-900 hover:bg-gray-800 text-white py-2.5 rounded-xl font-bold text-sm transition">הבנתי, תודה</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const MASTER_ADMIN_EMAIL = "xzz556786407@gmail.com";
        const firebaseConfig = {
            apiKey: "AIzaSyAFZXSNGr-1-8Q78mjDxaR0RAoh0yXxT48",
            authDomain: "alibot-deals.firebaseapp.com",
            projectId: "alibot-deals",
            storageBucket: "alibot-deals.firebasestorage.app",
            messagingSenderId: "1052728887673",
            appId: "1:1052728887673:web:267f0f9c4e51648d2647a8",
            measurementId: "G-EN67LMTT6T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // קונפיגורציית פורום מקומית
        window.forumConfig = {
            admins: [MASTER_ADMIN_EMAIL],
            banner: { active: false, title: "", text: "" },
            popup: { active: false, title: "", text: "" },
            threads: []
        };
        
        window.currentTab = 'all';
        window.activeThreadId = null;
        window.isForumAdmin = false;

        // טעינת הפורום
        window.loadForumData = async function() {
            document.getElementById('threadsLoader').classList.remove('hidden');
            try {
                const snap = await getDoc(doc(db, "forum", "global_settings"));
                if (snap.exists()) {
                    window.forumConfig = { ...window.forumConfig, ...snap.data() };
                } else {
                    // יצירת הגדרות ראשוניות אם המסמך לא קיים בענן
                    await setDoc(doc(db, "forum", "global_settings"), window.forumConfig);
                }
                
                applyForumSettingsToUI();
                window.renderThreads();
                window.checkForumAdminAccess();
                window.showForumPopupIfNeeded();
            } catch (e) {
                console.error("Error loading forum data:", e);
                window.renderThreads();
            }
            document.getElementById('threadsLoader').classList.add('hidden');
            
            // עדכון אנליטיקה
            try { await setDoc(doc(db, "forum", "analytics"), { visits: increment(1) }, { merge: true }); } catch(err){}
            window.updateAdminPanelStats();
        };

        function applyForumSettingsToUI() {
            const config = window.forumConfig;
            
            // עדכון באנר עליון
            const bannerBox = document.getElementById('forumBannerContainer');
            if (config.banner && config.banner.active && config.banner.title) {
                document.getElementById('forumBannerTitle').innerText = config.banner.title;
                document.getElementById('forumBannerText').innerText = config.banner.text;
                bannerBox.classList.remove('hidden');
            } else {
                bannerBox.classList.add('hidden');
            }
            
            // עדכון שדות קלט בפאנל ניהול
            if (config.banner) {
                document.getElementById('forumBannerActive').checked = config.banner.active;
                document.getElementById('forumBannerTitleInput').value = config.banner.title || "";
                document.getElementById('forumBannerTextInput').value = config.banner.text || "";
            }
            if (config.popup) {
                document.getElementById('forumPopupActive').checked = config.popup.active;
                document.getElementById('forumPopupTitleInput').value = config.popup.title || "";
                document.getElementById('forumPopupTextInput').value = config.popup.text || "";
            }
            
            window.renderAdminsManagementList();
        }

        window.renderThreads = function() {
            const listDiv = document.getElementById('forumThreadsList');
            if (!listDiv) return;
            
            let threads = window.forumConfig.threads || [];
            
            // סינון לפי טאב/קטגוריה
            if (window.currentTab !== 'all') {
                threads = threads.filter(t => t.category === window.currentTab);
            }
            
            if (threads.length === 0) {
                listDiv.innerHTML = `
                    <div class="bg-white p-8 rounded-xl border border-gray-200 text-center text-gray-500 shadow-sm">
                        <i class="fa-solid fa-comments-question text-3xl text-gray-300 mb-2 block"></i>
                        אין עדיין נושאים בקטגוריה זו. תהיה הראשון לפתוח דיון חדש!
                    </div>
                `;
                return;
            }
            
            // מיון נושאים: החדשים ביותר מופיעים למעלה
            const sortedThreads = [...threads].sort((a, b) => b.id - a.id);
            
            listDiv.innerHTML = sortedThreads.map(t => {
                const repliesCount = t.replies ? t.replies.length : 0;
                const categoryName = t.category === 'tech' ? 'מוצרי טכנולוגיה' : 'נעליים';
                
                return `
                    <div class="forum-card bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between gap-4 cursor-pointer" onclick="window.openThreadView('${t.id}')">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500 border border-gray-100 flex-shrink-0">
                                <i class="fa-solid fa-message text-sm"></i>
                            </div>
                            <div class="min-w-0">
                                <div class="flex items-center gap-1.5 flex-wrap mb-1">
                                    <span class="text-[11px] font-bold px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100">${t.type || 'בירור'}</span>
                                    <h4 class="font-bold text-gray-900 text-sm sm:text-base hover:text-blue-600 transition truncate">${t.title}</h4>
                                </div>
                                <div class="text-xs text-gray-500 flex items-center gap-2 flex-wrap font-medium">
                                    <span class="text-gray-700 font-bold"><i class="fa-solid fa-circle-user ml-0.5"></i> ${t.author}</span>
                                    <span>•</span>
                                    <span>קטגוריה: ${categoryName}</span>
                                    <span>•</span>
                                    <span>${t.date}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 text-center flex-shrink-0 pl-1">
                            <div class="bg-blue-50/50 px-3 py-1.5 rounded-lg border border-blue-100/40 min-w-[55px]">
                                <span class="block text-sm font-black text-blue-600">${repliesCount}</span>
                                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wider block">תגובות</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            window.renderAdminThreadsControl();
        };

        window.filterByTab = function(tabName) {
            window.currentTab = tabName;
            
            // עדכון כפתורי העיצוב בבר הסינונים
            ['all', 'tech', 'shoes'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (!btn) return;
                if (t === tabName) {
                    btn.className = "bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm";
                } else {
                    btn.className = "bg-white text-gray-600 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-semibold border border-gray-200";
                }
            });
            
            window.renderThreads();
        };

        // ניהול העורך (Composer)
        window.openComposer = function() {
            const user = auth.currentUser;
            if (!user) {
                alert("כדי לפתוח נושא חדש בפורום, עליך להתחבר לחשבון שלך.");
                return;
            }
            document.getElementById('postComposer').classList.remove('translate-y-full');
        };

        window.closeComposer = function() {
            document.getElementById('postComposer').classList.add('translate-y-full');
        };

        window.submitNewThread = async function() {
            const title = document.getElementById('composerTitle').value.trim();
            const content = document.getElementById('composerContent').value.trim();
            const category = document.getElementById('composerCategory').value;
            const type = document.getElementById('composerType').value;
            
            if (!title || !content) {
                alert("אנא מלא את כותרת הנושא ואת תוכן הפוסט.");
                return;
            }
            
            const user = auth.currentUser;
            const newThread = {
                id: Date.now().toString(),
                title: title,
                content: content,
                category: category,
                type: type,
                author: user.displayName || 'משתמש פורום',
                authorEmail: user.email,
                date: new Date().toLocaleDateString('he-IL') + " " + new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}),
                replies: []
            };
            
            try {
                const ref = doc(db, "forum", "global_settings");
                await updateDoc(ref, {
                    threads: arrayUnion(newThread)
                });
                
                // איפוס שדות העורך וסגירה
                document.getElementById('composerTitle').value = "";
                document.getElementById('composerContent').value = "";
                window.closeComposer();
                
                // רענון נתונים מקומיים
                window.forumConfig.threads.push(newThread);
                window.renderThreads();
                alert("הנושא פורסם בהצלחה בפורום!");
            } catch (e) {
                alert("שגיאה בפרסום הנושא. נסה שוב.");
            }
        };

        // צפייה בנושא ותגובות
        window.openThreadView = function(threadId) {
            const thread = window.forumConfig.threads.find(t => t.id === threadId);
            if (!thread) return;
            
            window.activeThreadId = threadId;
            document.getElementById('viewThreadType').innerText = thread.type || 'בירור';
            document.getElementById('viewThreadTitle').innerText = thread.title;
            
            const contentDiv = document.getElementById('threadViewContent');
            
            // רינדור הפוסט המקורי הראשון
            let html = `
                <div class="bg-blue-50/40 p-4 rounded-xl border border-blue-100 flex flex-col gap-2">
                    <div class="flex justify-between items-center border-b border-blue-100/60 pb-2 text-xs text-gray-500 font-semibold">
                        <span class="text-gray-800 font-bold"><i class="fa-solid fa-user-circle ml-1"></i> ${thread.author} (${thread.authorEmail})</span>
                        <span><i class="fa-solid fa-clock ml-1"></i> ${thread.date} #פוסט_ראשי</span>
                    </div>
                    <p class="text-sm text-gray-900 leading-relaxed whitespace-pre-wrap pt-1">${thread.content}</p>
                </div>
                <div class="text-xs font-bold text-gray-400 border-b border-gray-200 pb-1.5 uppercase tracking-wider"><i class="fa-solid fa-comments ml-1"></i> תגובות חברי הפורום</div>
            `;
            
            // רינדור התגובות אם קיימות
            if (thread.replies && thread.replies.length > 0) {
                html += thread.replies.map((r, idx) => `
                    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col gap-2">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-2 text-xs text-gray-400 font-medium">
                            <span class="text-gray-700 font-bold"><i class="fa-solid fa-reply ml-1"></i> ${r.author}</span>
                            <span>${r.date} #${idx + 1}</span>
                        </div>
                        <p class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">${r.content}</p>
                    </div>
                `).join('');
            } else {
                html += `
                    <div class="text-center text-xs text-gray-400 py-6" id="noRepliesText">
                        אין עדיין תגובות לנושא זה. כתוב את התגובה הראשונה שלך למטה!
                    </div>
                `;
            }
            
            contentDiv.innerHTML = html;
            document.getElementById('quickReplyInput').value = "";
            document.getElementById('threadViewModal').classList.remove('hidden');
        };

        window.closeThreadView = function() {
            document.getElementById('threadViewModal').classList.add('hidden');
            window.activeThreadId = null;
        };

        window.submitReply = async function() {
            const replyText = document.getElementById('quickReplyInput').value.trim();
            if (!replyText) return;
            
            const user = auth.currentUser;
            if (!user) {
                alert("עליך להתחבר כדי להגיב בפורום.");
                return;
            }
            
            const currentThread = window.forumConfig.threads.find(t => t.id === window.activeThreadId);
            if (!currentThread) return;
            
            const newReply = {
                author: user.displayName || 'משתמש פורום',
                authorEmail: user.email,
                content: replyText,
                date: new Date().toLocaleDateString('he-IL') + " " + new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})
            };
            
            // יצירת עותק מעודכן של השרשור למניעת שגיאות מערך בפיירבייס
            const updatedThread = { ...currentThread };
            if (!updatedThread.replies) updatedThread.replies = [];
            updatedThread.replies.push(newReply);
            
            try {
                const ref = doc(db, "forum", "global_settings");
                
                // עדכון בסיס הנתונים על ידי הסרת הישן והוספת החדש
                await updateDoc(ref, {
                    threads: arrayRemove(currentThread)
                });
                await updateDoc(ref, {
                    threads: arrayUnion(updatedThread)
                });
                
                // רענון מקומי מיידי
                window.forumConfig.threads = window.forumConfig.threads.map(t => t.id === window.activeThreadId ? updatedThread : t);
                
                // רענון התצוגה המקומית של חלונית הפוסט
                window.openThreadView(window.activeThreadId);
                window.renderThreads();
            } catch (e) {
                alert("שגיאה בשמירת התגובה.");
            }
        };

        // מערכת בקרת ניהול (ענן ניהול)
        window.toggleAdminPanel = function() {
            document.getElementById('adminPanel').classList.toggle('hidden');
        };

        window.checkForumAdminAccess = function() {
            const user = auth.currentUser;
            const admins = window.forumConfig.admins || [MASTER_ADMIN_EMAIL];
            
            if (user && admins.some(email => email.toLowerCase() === user.email.toLowerCase())) {
                document.getElementById('adminBtn').classList.remove('hidden');
                window.isForumAdmin = true;
            } else {
                document.getElementById('adminBtn').classList.add('hidden');
                window.isForumAdmin = false;
            }
        };

        window.updateAdminPanelStats = async function() {
            try {
                const snap = await getDoc(doc(db, "forum", "analytics"));
                if (snap.exists()) {
                    document.getElementById('forumStatVisits').innerText = snap.data().visits || 0;
                }
                const usersSnap = await getDoc(doc(db, "forum", "users_count"));
                if (usersSnap.exists()) {
                    document.getElementById('forumStatUsers').innerText = usersSnap.data().registered || 0;
                }
            } catch (e) {}
        };

        window.renderAdminsManagementList = function() {
            const listDiv = document.getElementById('forumAdminsList');
            if (!listDiv) return;
            const admins = window.forumConfig.admins || [MASTER_ADMIN_EMAIL];
            
            listDiv.innerHTML = admins.map(email => `
                <div class="flex justify-between items-center bg-gray-950 px-2.5 py-1.5 rounded-lg border border-gray-800 text-xs">
                    <span class="truncate pl-2 text-gray-300">${email}</span>
                    ${email.toLowerCase() !== MASTER_ADMIN_EMAIL.toLowerCase() 
                        ? `<button onclick="window.removeForumAdmin('${email}')" class="text-red-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>`
                        : `<span class="text-gray-500 text-[10px] bg-gray-900 px-2 py-0.5 rounded font-bold">ראשי</span>`
                    }
                </div>
            `).join('');
        };

        window.addForumAdmin = async function() {
            const input = document.getElementById('newForumAdminEmail');
            const email = input.value.trim().toLowerCase();
            
            if (!email || !email.includes('@')) return alert("אנא הזן כתובת מייל תקינה.");
            if (!window.forumConfig.admins) window.forumConfig.admins = [MASTER_ADMIN_EMAIL];
            
            if (window.forumConfig.admins.includes(email)) return alert("המנהל כבר קיים במערכת.");
            
            window.forumConfig.admins.push(email);
            try {
                await setDoc(doc(db, "forum", "global_settings"), window.forumConfig);
                input.value = "";
                applyForumSettingsToUI();
                alert("המנהל נוסף בהצלחה!");
            } catch(e) {}
        };

        window.removeForumAdmin = async function(email) {
            window.forumConfig.admins = window.forumConfig.admins.filter(e => e !== email);
            try {
                await setDoc(doc(db, "forum", "global_settings"), window.forumConfig);
                applyForumSettingsToUI();
                window.checkForumAdminAccess();
            } catch(e) {}
        };

        window.renderAdminThreadsControl = function() {
            const div = document.getElementById('adminThreadsControlList');
            if (!div) return;
            
            const threads = window.forumConfig.threads || [];
            if (threads.length === 0) {
                div.innerHTML = `<div class="text-center text-[11px] text-gray-500 py-2">אין נושאים לניהול.</div>`;
                return;
            }
            
            div.innerHTML = threads.map(t => `
                <div class="bg-gray-950 p-2 rounded-lg border border-gray-800 text-xs flex flex-col gap-1.5">
                    <div class="font-bold text-gray-200 truncate">${t.title}</div>
                    <div class="text-[10px] text-gray-400 truncate">מאת: ${t.author}</div>
                    <button onclick="window.deleteThreadFromAdmin('${t.id}')" class="w-full bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white transition text-[10px] py-1 rounded font-bold">
                        <i class="fa-solid fa-trash-can ml-1"></i> מחק נושא זה מהפורום
                    </button>
                </div>
            `).join('');
        };

        window.deleteThreadFromAdmin = async function(threadId) {
            if (!confirm("האם אתה בטוח שברצונך למחוק נושא זה וכל התגובות שבו לצמיתות מהפורום?")) return;
            
            const thread = window.forumConfig.threads.find(t => t.id === threadId);
            if (!thread) return;
            
            try {
                const ref = doc(db, "forum", "global_settings");
                await updateDoc(ref, {
                    threads: arrayRemove(thread)
                });
                
                window.forumConfig.threads = window.forumConfig.threads.filter(t => t.id !== threadId);
                window.renderThreads();
                if (window.activeThreadId === threadId) window.closeThreadView();
                alert("הנושא נמחק בהצלחה על ידי המנהל.");
            } catch (e) {
                alert("שגיאה במחיקת הנושא.");
            }
        };

        // ניהול באנר ופופאפ מתוך ענן הניהול
        window.saveForumBanner = async function() {
            window.forumConfig.banner = {
                active: document.getElementById('forumBannerActive').checked,
                title: document.getElementById('forumBannerTitleInput').value.trim(),
                text: document.getElementById('forumBannerTextInput').value.trim()
            };
            try {
                await setDoc(doc(db, "forum", "global_settings"), window.forumConfig);
                applyForumSettingsToUI();
                alert("הבאנר העליון עודכן בענן!");
            } catch(e) {}
        };

        window.saveForumPopup = async function() {
            window.forumConfig.popup = {
                active: document.getElementById('forumPopupActive').checked,
                title: document.getElementById('forumPopupTitleInput').value.trim(),
                text: document.getElementById('forumPopupTextInput').value.trim()
            };
            try {
                await setDoc(doc(db, "forum", "global_settings"), window.forumConfig);
                localStorage.removeItem("userSeenForumPopup"); // איפוס צפיות למשתמשים
                applyForumSettingsToUI();
                alert("הפופאפ עודכן בענן בהצלחה!");
            } catch(e) {}
        };

        window.showForumPopupIfNeeded = function() {
            const p = window.forumConfig.popup;
            if (!p || !p.active || !p.title) return;
            
            if (localStorage.getItem("userSeenForumPopup") === p.title) return;
            
            document.getElementById('popupTitleDisplay').innerText = p.title;
            document.getElementById('popupTextDisplay').innerText = p.text;
            document.getElementById('forumPopupModal').classList.remove('hidden');
            localStorage.setItem("userSeenForumPopup", p.title);
        };

        // מערכת אימות משתמשים (Auth)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const name = user.displayName ? user.displayName.split(' ')[0] : 'משתמש';
                document.getElementById('userAuthArea').innerHTML = `
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-xl border border-blue-100 text-sm font-bold shadow-sm">
                        <i class="fa-solid fa-circle-user ml-0.5 text-base"></i> ${name}
                        <button onclick="window.handleForumLogout()" class="text-gray-400 hover:text-red-500 mr-1 transition" title="התנתק"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                `;
                
                // עדכון רשומים בפורום
                getDoc(doc(db, "forum_users", user.uid)).then(snap => {
                    if (!snap.exists()) {
                        setDoc(doc(db, "forum_users", user.uid), { email: user.email, name: user.displayName, joined: new Date().toISOString() });
                        setDoc(doc(db, "forum", "users_count"), { registered: increment(1) }, { merge: true });
                    }
                });
                
                window.checkForumAdminAccess();
            } else {
                document.getElementById('adminBtn').classList.add('hidden');
                window.isForumAdmin = false;
            }
        });

        window.handleGoogleLogin = async function() {
            try { await signInWithPopup(auth, provider); window.loadForumData(); } catch(e) {}
        };

        window.handleForumLogout = function() {
            signOut(auth).then(() => window.location.reload());
        };

        // הפעלה ראשונית של המערכת
        window.loadForumData();
    </script>
</body>
</html>
